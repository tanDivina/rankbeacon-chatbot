<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RankBeacon Intake Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root {
            --bg-color: #030303;
            --card-bg: #0b0b0d;
            --card-border: rgba(184, 115, 51, 0.25);
            --copper: #b87333;
            --gold: #d4af37;
            --text-primary: #fdfbf7;
            --text-secondary: #a1a1aa;
            --glass-bg: rgba(11, 11, 13, 0.8);
            --gradient-primary: linear-gradient(135deg, #b87333 0%, #d4af37 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 10%, rgba(184, 115, 51, 0.08), transparent 60%);
            color: var(--text-primary);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Sleek custom scrollbars */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #08080a;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--card-border);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--copper);
        }

        .widget-container {
            max-width: 620px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-branding {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .header-branding .brand-title {
            font-size: 24px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: -0.05em;
            color: var(--text-primary);
        }

        .header-branding .brand-title span {
            color: var(--gold);
        }

        .beta-badge {
            font-family: 'Outfit', sans-serif;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 9999px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            background: rgba(212, 175, 55, 0.1);
            color: var(--gold);
            border: 1px solid rgba(212, 175, 55, 0.2);
            animation: betaPulse 2.5s ease-in-out infinite;
        }

        @keyframes betaPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); }
            50% { box-shadow: 0 0 10px 2px rgba(212, 175, 55, 0.15); }
        }

        .chat-widget {
            background-color: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 0 1px var(--card-border);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(10px);
            transition: box-shadow 0.3s ease;
        }

        .chat-widget:hover {
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(212, 175, 55, 0.35);
        }

        #chat-container {
            display: none;
            flex-direction: column;
            flex-grow: 1;
        }

        #messages {
            height: 480px;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            padding: 12px 18px;
            border-radius: 18px;
            max-width: 85%;
            word-wrap: break-word;
            line-height: 1.5;
            font-size: 15px;
            animation: bubbleSlide 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        @keyframes bubbleSlide {
            from { opacity: 0; transform: translateY(10px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .message.user {
            background: linear-gradient(135deg, rgba(184, 115, 51, 0.15) 0%, rgba(212, 175, 55, 0.08) 100%);
            color: var(--text-primary);
            align-self: flex-end;
            border-radius: 18px 18px 2px 18px;
            border: 1px solid rgba(212, 175, 55, 0.25);
        }

        .message.assistant {
            background-color: #121215;
            color: var(--text-primary);
            align-self: flex-start;
            border-radius: 18px 18px 18px 2px;
            border: 1px solid rgba(253, 251, 247, 0.08);
        }

        .message.assistant a {
            color: var(--gold);
            text-decoration: underline;
            transition: color 0.2s;
        }

        .message.assistant a:hover {
            color: var(--copper);
        }

        #options-container {
            padding: 8px 24px 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            border-top: 1px solid rgba(253, 251, 247, 0.05);
        }

        .option-button {
            background-color: #141418;
            border: 1px solid rgba(253, 251, 247, 0.1);
            color: var(--text-secondary);
            padding: 10px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            font-family: 'Outfit', sans-serif;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .option-button:hover {
            background-color: rgba(212, 175, 55, 0.08);
            border-color: var(--gold);
            color: var(--gold);
            transform: translateY(-1px);
        }

        .option-button:active {
            transform: translateY(0);
        }

        .input-area {
            display: flex;
            padding: 18px 24px;
            border-top: 1px solid rgba(253, 251, 247, 0.05);
            background-color: rgba(11, 11, 13, 0.6);
            align-items: center;
        }

        #input {
            flex-grow: 1;
            padding: 12px 20px;
            border: 1px solid rgba(253, 251, 247, 0.1);
            background-color: #0d0d10;
            color: var(--text-primary);
            border-radius: 9999px;
            outline: none;
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        #input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 12px rgba(212, 175, 55, 0.15);
            background-color: #08080a;
        }

        #input::placeholder {
            color: rgba(253, 251, 247, 0.35);
        }

        #send-button {
            padding: 12px 24px;
            margin-left: 12px;
            border-radius: 9999px;
            border: none;
            background: var(--gradient-primary);
            color: #030303;
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
            font-family: 'Outfit', sans-serif;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 15px rgba(184, 115, 51, 0.3);
        }

        #send-button:hover {
            opacity: 0.95;
            transform: translateY(-1px) scale(1.02);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.4);
        }

        #send-button:active {
            transform: translateY(0) scale(0.98);
        }

        #signin-container, #dashboard {
            padding: 50px 30px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        #project-list {
            list-style-type: none;
            padding: 0;
            width: 100%;
            margin: 15px 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        #project-list li {
            background-color: #121215;
            border: 1px solid rgba(253, 251, 247, 0.08);
            padding: 16px 20px;
            border-radius: 12px;
            text-align: left;
            font-weight: 500;
            font-size: 15px;
            transition: all 0.2s ease;
        }

        #project-list li:hover {
            border-color: rgba(212, 175, 55, 0.3);
            background-color: #16161a;
        }

        #new-project-btn {
            background: var(--gradient-primary);
            color: #030303;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 15px rgba(184, 115, 51, 0.3);
            width: 100%;
            max-width: 320px;
        }

        #new-project-btn:hover {
            opacity: 0.95;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.4);
        }

        .signin-gbutton {
            margin-top: 10px;
            display: flex;
            justify-content: center;
        }

        h2 {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
        }

        p.subtitle {
            color: var(--text-secondary);
            font-size: 15px;
            max-width: 340px;
            margin: 0 auto;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="widget-container">
        <div class="header-branding">
            <!-- Inline Lighthouse Logo - Matches Landing Page Gilt Theme -->
            <svg width="48" height="38" viewBox="70 40 120 110" style="margin-right: -6px; margin-top: -4px;">
                <!-- Base Foundation -->
                <ellipse cx="100" cy="140" rx="20" ry="6" fill="#b87333" fillOpacity="0.4"/>
                <!-- Lighthouse Base -->
                <path d="M80 140 L120 140 L115 80 L85 80 Z" fill="#b87333"/>
                <!-- Lighthouse Stripes -->
                <rect x="85" y="90" width="30" height="6" fill="#fdfbf7" fillOpacity="0.9"/>
                <rect x="85" y="105" width="30" height="6" fill="#fdfbf7" fillOpacity="0.9"/>
                <rect x="85" y="120" width="30" height="6" fill="#fdfbf7" fillOpacity="0.9"/>
                <!-- Lighthouse Top Structure -->
                <rect x="82" y="70" width="36" height="15" fill="#b87333"/>
                <rect x="85" y="65" width="30" height="10" fill="#fdfbf7"/>
                <!-- Lighthouse Dome -->
                <path d="M85 65 Q100 55 115 65" fill="#b87333"/>
                <!-- Light Source -->
                <circle cx="100" cy="72" r="4" fill="#d4af37"/>
                <!-- Light Beams -->
                <g>
                    <path d="M100 72 L140 30 L155 40 L120 65 Z" fill="#d4af37" fillOpacity="0.4"/>
                    <path d="M100 72 L170 45 L180 60 L140 75 Z" fill="#d4af37" fillOpacity="0.15"/>
                </g>
            </svg>
            <div class="brand-title">Rank<span>Beacon</span></div>
            <span class="beta-badge">Beta</span>
        </div>
        <div class="chat-widget">
            <div id="signin-container">
                <h2>Welcome to RankBeacon</h2>
                <p class="subtitle">Sign in to start chatting with your AI assistant and configure your SEO projects.</p>
                <div id="g_id_onload" data-client_id="238463452910-22bchpr9irj0m8fkjmm3v36j9et9lpmq.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
                <div class="g_id_signin signin-gbutton" data-type="standard" data-theme="filled_black" data-shape="pill" data-size="large"></div>
            </div>

            <div id="dashboard" style="display: none;">
                <h2>Your SEO Projects</h2>
                <p class="subtitle">Select a project to view details, or begin a new SEO audit intake.</p>
                <ul id="project-list"><li>Loading...</li></ul>
                <button id="new-project-btn" onclick="startNewIntake()">+ Start New Project Intake</button>
            </div>

            <div id="chat-container" style="display: none;">
                <div id="messages"></div>
                <div id="options-container"></div>
                <div class="input-area">
                    <input type="text" id="input" placeholder="Type or click an option...">
                    <button id="send-button" onclick="handleSendClick()">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let googleToken;
        let currentProjectId;
        let currentStep = 0;

        // --- MODAL API ENDPOINTS ---
        const getProjectsUrl = "https://tandivina--get-projects.modal.run";
        const chatUrl = "https://tandivina--chat.modal.run";

        const intakeFlow = [
            { id: 'project-type', options: ['Blog / Content Site', 'E-commerce Store', 'SaaS / Product', 'Local Business', 'Other'] },
            { id: 'niche', options: [] },
            { id: 'target-audience', suggestions: ['Small business owners', 'Tech enthusiasts', 'Health-conscious millennials'] },
            { id: 'content-types', options: ['How-to Guides', 'Product Reviews', 'Listicles / Top 10s', 'Recipes'] },
            { id: 'goals', options: ['Drive Sales', 'Build Brand Authority', 'Generate Leads'] },
            { id: 'voice', options: ['Professional & Authoritative', 'Friendly & Casual', 'Witty & Humorous'] },
            { id: 'language', options: ['English', 'Spanish', 'French', 'German', 'Dutch'] }
        ];

        async function handleCredentialResponse(response) {
            googleToken = response.credential;
            document.getElementById('signin-container').style.display = 'none';
            document.getElementById('dashboard').style.display = 'flex';
            fetchProjects();
        }

        async function fetchProjects() {
            const projectList = document.getElementById('project-list');
            projectList.innerHTML = '<li>Fetching projects...</li>';
            try {
                const response = await fetch(getProjectsUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: googleToken })
                });
                if (!response.ok) { throw new Error(JSON.stringify(await response.json())); }
                const data = await response.json();
                projectList.innerHTML = '';
                if (data.projects && data.projects.length > 0) {
                    data.projects.forEach(project => {
                        const li = document.createElement('li');
                        li.textContent = project.name;
                        projectList.appendChild(li);
                    });
                } else {
                    projectList.innerHTML = '<li style="color: var(--text-secondary); text-align: center;">No projects found. Start a new intake!</li>';
                }
            } catch (error) {
                projectList.innerHTML = '<li style="color: #ef4444; text-align: center;">Could not load projects. Please try again.</li>';
                console.error("Fetch Projects Error:", error);
            }
        }

        function startNewIntake() {
            currentProjectId = `project_${new Date().getTime()}`;
            currentStep = 0;
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('chat-container').style.display = 'flex';
            document.getElementById('messages').innerHTML = '';
            sendMessage("start_new_project");
        }
        
        function renderOptions() {
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            if (currentStep >= intakeFlow.length) return;
            const step = intakeFlow[currentStep];
            const options = step.options || step.suggestions || [];
            options.forEach(optionText => {
                const button = document.createElement('button');
                button.className = 'option-button';
                button.textContent = optionText;
                button.onclick = () => handleOptionClick(optionText);
                optionsContainer.appendChild(button);
            });
        }

        function handleOptionClick(optionText) {
            addMessage(optionText, 'user');
            sendMessage(optionText);
        }

        function handleSendClick() {
            const input = document.getElementById('input');
            const message = input.value.trim();
            if (message) { 
                addMessage(message, 'user');
                sendMessage(message);
            }
        }

        async function sendMessage(message) {
            const input = document.getElementById('input');
            const sendButton = document.getElementById('send-button');
            const optionsContainer = document.getElementById('options-container');
            if (!message || !googleToken) return;
            
            input.value = '';
            input.disabled = true;
            sendButton.disabled = true;
            optionsContainer.innerHTML = '';

            try {
                const response = await fetch(chatUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: googleToken, message: message, projectId: currentProjectId }),
                });
                if (!response.ok) { throw new Error(JSON.stringify(await response.json())); }
                const data = await response.json();
                addMessage(data.reply, 'assistant');
                
                if (message === "start_new_project") {
                    currentStep = 0;
                } else {
                    currentStep++;
                }
                
                if (!data.reply.includes("That's everything I need")) {
                    renderOptions();
                }

            } catch (error) {
                addMessage('An error occurred. Please try again.', 'assistant');
                console.error("Send Message Error:", error);
            } finally {
                input.disabled = false;
                sendButton.disabled = false;
                input.focus();
            }
        }

        function addMessage(text, sender) {
            const messagesContainer = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            const tempDiv = document.createElement('div');
            tempDiv.textContent = text;
            let html = tempDiv.innerHTML;
            html = html.replace(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\n/g, '<br>');
            messageDiv.innerHTML = html;
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        document.getElementById('input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') { handleSendClick(); }
        });
    </script>
</body>
</html>
